<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유효하지 않은 티켓</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f4f5f7; margin: 0;
           display: flex; align-items: center; justify-content: center; height: 100vh; }
    .box { text-align: center; background: #fff; padding: 48px 40px; border-radius: 16px;
           box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .icon { font-size: 48px; }
    h1 { font-size: 20px; color: #d93025; margin: 16px 0 8px; }
    p { color: #888; margin: 0; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">⚠️</div>
    <h1>유효하지 않은 티켓입니다</h1>
    <p>티켓이 존재하지 않거나 취소되었습니다.</p>
  </div>
</body>
</html>
