<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>얼굴 등록</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f4f5f7; margin: 0; padding: 24px; }
    .card { max-width: 420px; margin: 40px auto; background: #fff; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 32px 28px; text-align: center; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #888; font-size: 14px; line-height: 1.6; }
    .guide { width: 180px; height: 230px; margin: 24px auto; border: 3px dashed #2d6cdf;
             border-radius: 50% / 42%; }
    ol { text-align: left; color: #555; font-size: 14px; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>얼굴 등록 안내</h1>
    <p>입장 시 본인 확인을 위해 얼굴을 등록합니다.</p>
    <div class="guide"></div>
    <ol>
      <li>밝은 곳에서 정면을 바라보세요.</li>
      <li>얼굴을 타원 가이드라인 안에 맞춰주세요.</li>
      <li>마스크·모자·선글라스를 벗어주세요.</li>
      <li>등록 후 동일한 얼굴로만 입장할 수 있습니다.</li>
    </ol>
    <p>가이드라인 확인은 <code>POST /api/v1/face/check/</code>,<br>
       등록은 <code>POST /api/v1/tickets/&lt;id&gt;/face-register/</code> 를 사용합니다.</p>
  </div>
</body>
</html>
