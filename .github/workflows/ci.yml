name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install uv setuptools && uv pip install --system --no-build-isolation -e ".[dev]"

      - name: ruff lint
        run: ruff check apps tests

      - name: bandit security scan
        run: bandit -r apps -ll -q

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tecker
          MYSQL_USER: tecker
          MYSQL_PASSWORD: tecker
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install uv setuptools && uv pip install --system --no-build-isolation -e ".[dev]"

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DB_HOST: 127.0.0.1
          DB_NAME: tecker
          DB_USER: tecker
          DB_PASSWORD: tecker
          DB_PORT: 3306
          REDIS_URL: redis://127.0.0.1:6379/1
          REDIS_CACHE_URL: redis://127.0.0.1:6379/1
          CELERY_BROKER_URL: redis://127.0.0.1:6379/0
        run: pytest --cov=apps --cov-report=xml --cov-fail-under=80

      - name: Check authentication on all views
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: python scripts/check_auth_classes.py

      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  build-check:
    needs: [static, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build web image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
